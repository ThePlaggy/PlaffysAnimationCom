<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <script>
    const url = window.location.pathname.toLowerCase();
    if(url.includes('rohcutt') && url !== '/rohcutt') {
      // Weiterleitung nur für falsche Schreibweisen von rohcutt
      window.location.href = '/rohcutt';
    }
  </script>
  <title>Seite nicht gefunden</title>
</head>
<body>
  <h1>Fehler 404</h1>
  <p>Diese Seite konnte nicht gefunden werden.</p>
</body>
</html>
