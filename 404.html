<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <script>
    const url = window.location.pathname.toLowerCase();
    if(url.includes('rohcutt') && url !== '/rohcutt') {
      window.location.href = '/rohcutt';
    }
  </script>
  <title>Weiterleitung</title>
</head>
<body>
  <p>Du wirst weitergeleitet: <a href="/rohcutt">Rohcutt</a></p>
</body>
</html>
